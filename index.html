<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/code-xml.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K.Junior - Dev Web</title>

  <meta name="google-site-verification" content="TXjQilMCafhaidPxoomiHsvMueR_u-KwQC5hupTQ8vM" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Delius&family=Permanent+Marker&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <!-- Tema Dark Profissional -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Delius&family=M+PLUS+Rounded+1c&family=Permanent+Marker&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Delius&family=M+PLUS+Rounded+1c&family=Permanent+Marker&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <script src="https://unpkg.com/scrollreveal"></script>

  <script>

    tailwind.config = {
      darkMode: 'dark',
      theme: {
        extend: {

          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeInRight: {
              '0%': { opacity: '0', transform: 'translateX(-20px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            bounceSubtle: {
              '0%, 100%': { transform: 'translateY(-3%)' },
              '50%': { transform: 'translateY(0)' },
            },
            'slow-pan': {
              '0%': { transform: 'scale(1.1) translate(0, 0)' },
              '50%': { transform: 'scale(1.2) translate(5%, -5%)' },
              '100%': { transform: 'scale(1.1) translate(0, 0)' }
            },

            'float-y': {
              '0%, 100%': { transform: 'translateY(-4%)' },
              '50%': { transform: 'translateY(4%)' }
            }
          },

          animation: {
            'fade-in-up': 'fadeInUp 1s ease-out forwards',
            'fade-in-right': 'fadeInRight 1s ease-out forwards',
            'bounce-subtle': 'bounceSubtle 3s infinite ease-in-out',
            'animated-bounce': 'bounce 1s ease-in-out infinite',

            'slow-pan': 'slow-pan 15s infinite ease-in-out',
            'float-y': 'float-y 20s infinite ease-in-out'
          }
        }
      }

    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>

</head>


<body>




  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>


</body>

</html>
